{{ $wrapperClass := "min-w-[220px] py-2 border-dotted border-s-1 -ms-5 ps-5 dark:border-neutral-600" }}

<style>
  .craft-beer-nav details.craft-beer-country {
    margin-bottom: 0.15rem;
  }
  .craft-beer-nav summary.craft-beer-country-summary {
    cursor: pointer;
    font-weight: 600;
    font-size: 0.95rem;
    line-height: 1.4;
    padding: 0.35rem 0;
    list-style: none;
  }
  .craft-beer-nav summary.craft-beer-country-summary::-webkit-details-marker {
    display: none;
  }
  .craft-beer-nav summary.craft-beer-country-summary::before {
    content: "▸";
    display: inline-block;
    margin-right: 0.35rem;
    transition: transform 0.15s ease;
    font-size: 0.75rem;
    opacity: 0.6;
  }
  .craft-beer-nav details[open] > summary.craft-beer-country-summary::before {
    transform: rotate(90deg);
  }
  .craft-beer-nav ul.craft-beer-breweries {
    list-style: none;
    margin: 0.15rem 0 0.5rem 0.85rem;
    padding: 0;
  }
  .craft-beer-nav ul.craft-beer-breweries li {
    margin: 0.1rem 0;
  }
  .craft-beer-nav a.craft-beer-brewery-link {
    font-size: 0.82rem;
    line-height: 1.35;
    text-decoration: none;
    opacity: 0.85;
  }
  .craft-beer-nav a.craft-beer-brewery-link:hover,
  .craft-beer-nav a.craft-beer-brewery-link.active {
    opacity: 1;
    text-decoration: underline;
  }
  .article-content h3.relative.group {
    font-size: 1.05rem;
    font-weight: 700;
    margin-top: 1.75rem;
    margin-bottom: 0.35rem;
  }
</style>

<details
  open
  id="TOCView"
  class="toc-right mt-0 overflow-y-auto overscroll-contain bf-scrollbar rounded-lg -ms-5 ps-5 pe-2 hidden lg:block">
  <summary
    class="block py-1 text-lg font-semibold cursor-pointer bg-neutral-100 text-neutral-800 -ms-5 ps-5 dark:bg-neutral-700 dark:text-neutral-100 lg:hidden">
    {{ i18n "article.table_of_contents" }}
  </summary>
  <div class="{{ $wrapperClass }}">
    <nav class="craft-beer-nav" data-craft-beer-nav aria-label="{{ i18n "article.table_of_contents" }}"></nav>
  </div>
</details>

<details class="toc-inside mt-0 overflow-hidden rounded-lg -ms-5 ps-5 lg:hidden">
  <summary
    class="py-1 text-lg font-semibold cursor-pointer bg-neutral-100 text-neutral-800 -ms-5 ps-5 dark:bg-neutral-700 dark:text-neutral-100 lg:hidden">
    {{ i18n "article.table_of_contents" }}
  </summary>
  <div class="py-2 border-dotted border-neutral-300 border-s-1 -ms-5 ps-5 dark:border-neutral-600">
    <nav class="craft-beer-nav" data-craft-beer-nav aria-label="{{ i18n "article.table_of_contents" }}"></nav>
  </div>
</details>

<script>
  (function () {
    'use strict'

    function breweryLabel(h3) {
      let text = h3.childNodes[0]?.textContent?.trim() || h3.textContent.trim()
      const dash = text.indexOf(' — ')
      if (dash > -1) text = text.slice(0, dash)
      return text.replace(/\s*\(\d{4}\)\s*$/, '').trim()
    }

    function countryTitleWithCount(title, count) {
      const base = title.replace(/\s*\(\d+\)\s*$/, '').trim()
      return `${base} (${count})`
    }

    function updateCountryHeading(h2, count) {
      const textNode = h2.firstChild
      if (textNode?.nodeType !== Node.TEXT_NODE) return
      textNode.textContent = countryTitleWithCount(textNode.textContent.trim(), count)
    }

    function buildNav(container) {
      if (container.dataset.built === 'true') return
      const article = document.querySelector('.article-content')
      if (!article) return

      const countries = [...article.querySelectorAll('h2')]
      countries.forEach((h2) => {
        const countryTitle =
          h2.childNodes[0]?.textContent?.trim() || h2.textContent.trim()

        const details = document.createElement('details')
        details.className = 'craft-beer-country'

        const summary = document.createElement('summary')
        summary.className = 'craft-beer-country-summary'

        const ul = document.createElement('ul')
        ul.className = 'craft-beer-breweries'

        let el = h2.nextElementSibling
        while (el && el.tagName !== 'H2') {
          const h3 =
            el.tagName === 'H3'
              ? el
              : el.classList?.contains('coffee-shop-card')
                ? el.querySelector('h3')
                : null
          if (h3) {
            const breweryAnchor = h3.querySelector('.anchor')
            const id = breweryAnchor?.id
            if (id) {
              const li = document.createElement('li')
              const a = document.createElement('a')
              a.href = '#' + id
              a.textContent = breweryLabel(h3)
              a.className = 'craft-beer-brewery-link'
              a.addEventListener('click', () => {
                container
                  .querySelectorAll('details.craft-beer-country')
                  .forEach((d) => {
                    d.open = d === details
                  })
                details.open = true
              })
              li.appendChild(a)
              ul.appendChild(li)
            }
          }
          el = el.nextElementSibling
        }

        const breweryCount = ul.children.length
        const titledWithCount = countryTitleWithCount(countryTitle, breweryCount)
        summary.textContent = titledWithCount
        updateCountryHeading(h2, breweryCount)

        details.addEventListener('toggle', () => {
          if (details.open) {
            container
              .querySelectorAll('details.craft-beer-country')
              .forEach((d) => {
                if (d !== details) d.open = false
              })
          }
        })

        details.appendChild(summary)
        if (ul.children.length > 0) {
          details.appendChild(ul)
        }
        container.appendChild(details)
      })

      container.dataset.built = 'true'
    }

    function init() {
      document.querySelectorAll('[data-craft-beer-nav]').forEach(buildNav)
    }

    document.readyState === 'loading'
      ? document.addEventListener('DOMContentLoaded', init)
      : init()
  })()
</script>
