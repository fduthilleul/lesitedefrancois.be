colorScheme = "blowfish"
defaultAppearance = "light"
autoSwitchAppearance = true

enableSearch = true
enableCodeCopy = false

logo = "images/logo.jpg"
disableTextInHeader = true

mainSections = ["voyages", "sorties", "divers"]

disableImageOptimization = false
highlightCurrentMenuArea = true
smartTOC = true

[header]
  layout = "fixed"

[footer]
  showMenu = false
  showCopyright = true
  showThemeAttribution = true
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "custom"
  homepageImage = "images/hero.jpg"
  showRecent = false
  cardView = false
  layoutBackgroundBlur = false

[article]
  showDate = true
  showDateOnlyInArticle = true
  showAuthor = false
  showHero = true
  heroStyle = "big"
  showBreadcrumbs = true
  showPagination = true
  showReadingTime = false
  showWordCount = false
  showTableOfContents = true
  showRelatedContent = true
  relatedContentLimit = 3
  showTaxonomies = true
  sharingLinks = ["whatsapp", "facebook", "email"]

[list]
  showHero = false
  showBreadcrumbs = true
  showSummary = true
  showCards = true
  cardView = true
  cardViewScreenWidth = false
  groupByYear = false

[taxonomy]
  showTermCount = true
  cardView = true
