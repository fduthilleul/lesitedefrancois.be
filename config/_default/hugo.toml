theme = "blowfish"
baseURL = "https://fduthilleul.github.io/lesitedefrancois.be/"
defaultContentLanguage = "fr"

enableRobotsTXT = true
summaryLength = 30
buildDrafts = false
buildFuture = false

# Hidden until reintegrated; content files kept in repo
ignoreFiles = ['content/divers/', 'content/les-incontournables']

[pagination]
  pagerSize = 20

[imaging]
  anchor = 'Center'

[taxonomies]
  tag = "tags"
  category = "categories"
  topic = "topics"
  
[sitemap]
  changefreq = 'weekly'
  filename = 'sitemap.xml'
  priority = 0.5

[outputs]
  home = ["HTML", "RSS", "JSON"]

[related]
  threshold = 0
  toLower = false

    [[related.indices]]
        name = "tags"
        weight = 100

    [[related.indices]]
        name = "categories"
        weight = 100

    [[related.indices]]
        name = "date"
        weight = 10
